# UI Packages (Calunga)
- jira_projects: [SSCUI, PULP]
  component: Calunga
  labels: [TSD-UI]
  repo_url: git@gitlab.cee.redhat.com:hosted-pulp/ui-packages.redhat.com.git
  local_dir: ~/work/ui-packages.redhat.com/
  default_branch: main
  host: GitLab
  validation: [npm test, npx tsc --noEmit]

